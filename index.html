<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartman Castle — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f5; --surface: #ffffff; --surface2: #f1efe9;
    --border: rgba(0,0,0,0.1); --text: #1a1a1a; --text2: #666; --text3: #999;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --green: #166534; --green-light: #dcfce7;
    --amber: #92400e; --amber-light: #fef3c7;
    --red: #991b1b; --red-light: #fee2e2;
    --purple: #5b21b6; --purple-light: #ede9fe;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header h1 i { font-size: 20px; color: var(--blue); }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-live { background: var(--green-light); color: var(--green); }
  .badge-warn { background: var(--amber-light); color: var(--amber); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn { font-size: 13px; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text); display: flex; align-items: center; gap: 5px; }
  .btn:hover { background: var(--surface2); }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
  .metric-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .occ-bar-wrap { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .occ-bar { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.6s ease; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .booking-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .booking-row:last-child { border-bottom: none; padding-bottom: 0; }
  .booking-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .avatar-airbnb { background: #ffe4e6; color: #be123c; }
  .avatar-homeaway { background: var(--blue-light); color: var(--blue); }
  .avatar-other { background: var(--surface2); color: var(--text2); }
  .booking-code { font-size: 14px; font-weight: 600; color: var(--text); }
  .booking-meta { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .booking-right { margin-left: auto; text-align: right; flex-shrink: 0; }
  .booking-nights { font-size: 13px; font-weight: 600; color: var(--text); }
  .booking-guests { font-size: 12px; color: var(--text2); }
  .platform-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
  .pill-airbnb { background: #ffe4e6; color: #be123c; }
  .pill-vrbo { background: var(--blue-light); color: var(--blue); }
  .pill-other { background: var(--surface2); color: var(--text2); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-head { font-size: 10px; color: var(--text3); text-align: center; padding: 3px 0; font-weight: 600; }
  .cal-day { height: 32px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: default; }
  .cal-empty { background: transparent; }
  .cal-available { background: var(--surface2); color: var(--text2); }
  .cal-booked { background: var(--blue); color: #fff; font-weight: 600; }
  .cal-today { outline: 2px solid var(--blue); outline-offset: -2px; }
  .cal-past { opacity: 0.35; }
  .cal-legend { display: flex; gap: 14px; margin-top: 10px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }
  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--text2); border-radius: 50%; animation: sp 0.7s linear infinite; vertical-align: middle; }
  @keyframes sp { to { transform: rotate(360deg); } }
  .empty { font-size: 13px; color: var(--text3); padding: 4px 0; }
  .updated { font-size: 12px; color: var(--text3); }
  .error { background: var(--red-light); color: var(--red); font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="header">
  <h1><i class="ti ti-building-castle"></i> Hartman Castle</h1>
  <div class="header-right">
    <span class="updated" id="last-updated">Error</span>
    <span class="badge badge-warn" id="status-badge">Error</span>
    <button class="btn" onclick="loadData()"><i class="ti ti-refresh"></i> Refresh</button>
  </div>
</div>

<div id="error-area"><div class="error">Could not load data: Failed to fetch</div></div>

<div class="metric-grid">
  <div class="metric">
    <div class="metric-label">Active bookings</div>
    <div class="metric-value" id="active-count"><span class="spin"></span></div>
    <div class="metric-sub" id="active-sub">confirmed</div>
  </div>
  <div class="metric">
    <div class="metric-label">Upcoming (30 days)</div>
    <div class="metric-value" id="upcoming-count"><span class="spin"></span></div>
    <div class="metric-sub">check-ins</div>
  </div>
  <div class="metric">
    <div class="metric-label">Occupancy (this mo.)</div>
    <div class="metric-value" id="occ-rate"><span class="spin"></span></div>
    <div class="occ-bar-wrap"><div class="occ-bar" id="occ-bar" style="width:0%"></div></div>
  </div>
  <div class="metric">
    <div class="metric-label">Nights booked (mo.)</div>
    <div class="metric-value" id="nights-booked"><span class="spin"></span></div>
    <div class="metric-sub" id="nights-sub">this month</div>
  </div>
</div>

<div class="card">
  <div class="card-title">Upcoming bookings</div>
  <div id="bookings-list"><span class="spin"></span></div>
</div>

<div class="card">
  <div class="card-title" id="cal-title">Calendar</div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend">
    <div class="leg"><div class="leg-dot" style="background:#185FA5"></div> Booked</div>
    <div class="leg"><div class="leg-dot" style="background:#f1efe9;border:1px solid rgba(0,0,0,0.1)"></div> Available</div>
  </div>
</div>

<script>
function fmt(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function parseDate(str) { return new Date(str); }

function platformLabel(p) {
  if (p === 'airbnb') return '<span class="platform-pill pill-airbnb">Airbnb</span>';
  if (p === 'homeaway') return '<span class="platform-pill pill-vrbo">VRBO</span>';
  return '<span class="platform-pill pill-other">' + p + '</span>';
}
function avatarClass(p) {
  if (p === 'airbnb') return 'avatar-airbnb';
  if (p === 'homeaway') return 'avatar-homeaway';
  return 'avatar-other';
}
function avatarIcon(p) {
  if (p === 'airbnb') return 'A';
  if (p === 'homeaway') return 'V';
  return '?';
}

async function loadData() {
  document.getElementById('last-updated').textContent = 'Refreshing...';
  try {
    const res = await fetch('/api/reservations');
    if (!res.ok) throw new Error('API error ' + res.status);
    const json = await res.json();
    render(json.data || []);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('status-badge').textContent = 'Live';
    document.getElementById('status-badge').className = 'badge badge-live';
  } catch(e) {
    document.getElementById('error-area').innerHTML = '<div class="error">Could not load data: ' + e.message + '</div>';
    document.getElementById('last-updated').textContent = 'Error';
    document.getElementById('status-badge').textContent = 'Error';
    document.getElementById('status-badge').className = 'badge badge-warn';
  }
}

function render(reservations) {
  const now = new Date();
  const in30 = new Date(now); in30.setDate(in30.getDate() + 30);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  const daysInMonth = monthEnd.getDate();

  const accepted = reservations.filter(r => r.status === 'accepted');

  const upcoming = accepted
    .filter(r => parseDate(r.arrival_date) >= now)
    .sort((a,b) => parseDate(a.arrival_date) - parseDate(b.arrival_date));

  const in30Days = upcoming.filter(r => parseDate(r.arrival_date) <= in30);

  let nightsThisMonth = 0;
  accepted.forEach(r => {
    const arr = parseDate(r.arrival_date);
    const dep = parseDate(r.departure_date);
    for (let d = new Date(arr); d < dep; d.setDate(d.getDate()+1)) {
      if (d >= monthStart && d <= monthEnd) nightsThisMonth++;
    }
  });

  const occ = Math.min(100, Math.round((nightsThisMonth / daysInMonth) * 100));

  document.getElementById('active-count').textContent = accepted.length;
  document.getElementById('upcoming-count').textContent = in30Days.length;
  document.getElementById('occ-rate').textContent = occ + '%';
  document.getElementById('occ-bar').style.width = occ + '%';
  document.getElementById('nights-booked').textContent = nightsThisMonth;
  document.getElementById('nights-sub').textContent = 'of ' + daysInMonth + ' days';

  const bEl = document.getElementById('bookings-list');
  if (!upcoming.length) {
    bEl.innerHTML = '<p class="empty">No upcoming bookings.</p>';
  } else {
    bEl.innerHTML = upcoming.map(r => {
      const arr = parseDate(r.arrival_date);
      const dep = parseDate(r.departure_date);
      return `<div class="booking-row">
        <div class="booking-avatar ${avatarClass(r.platform)}">${avatarIcon(r.platform)}</div>
        <div>
          <div class="booking-code">${r.code} ${platformLabel(r.platform)}</div>
          <div class="booking-meta">${fmt(arr)} → ${fmt(dep)}</div>
        </div>
        <div class="booking-right">
          <div class="booking-nights">${r.nights} night${r.nights !== 1 ? 's' : ''}</div>
          <div class="booking-guests"><i class="ti ti-users" style="font-size:11px;vertical-align:-1px;"></i> ${r.guests.total} guests</div>
        </div>
      </div>`;
    }).join('');
  }

  renderCalendar(accepted);
}

function renderCalendar(accepted) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const days = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const booked = new Set();
  accepted.forEach(r => {
    const arr = parseDate(r.arrival_date);
    const dep = parseDate(r.departure_date);
    for (let d = new Date(arr); d < dep; d.setDate(d.getDate()+1)) {
      if (d.getMonth() === month && d.getFullYear() === year) booked.add(d.getDate());
    }
  });
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = months[month] + ' ' + year;
  const heads = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-head">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-empty"></div>';
  for (let d = 1; d <= days; d++) {
    const past = d < now.getDate();
    const today = d === now.getDate();
    const isBooked = booked.has(d);
    let cls = 'cal-day ';
    cls += past ? 'cal-past cal-available' : isBooked ? 'cal-booked' : 'cal-available';
    if (today) cls += ' cal-today';
    cells += `<div class="${cls}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = heads + cells;
}

loadData();
</script>


</body></html>
